sources:
  - name: Indeed Ireland (RSS)
    type: rss
    enabled: true
    url_template: "https://ie.indeed.com/rss?q={query}&l=Ireland"
  - name: IrishJobs.ie (HTML)
    type: html
    enabled: true
    url_template: "https://www.irishjobs.ie/ShowResults.aspx?Keywords={query}&Location=Ireland"
    selectors:
      job_card: ".job-result"
      title: ".job-title"
      company: ".job-company"
      location: ".job-location"
      link: "a"
      date: ".job-date"
      snippet: ".job-description"
  - name: Jobs.ie (HTML)
    type: html
    enabled: true
    url_template: "https://www.jobs.ie/jobs?q={query}&l=Ireland"
    selectors:
      job_card: ".job-result"
      title: ".job-title"
      company: ".job-company"
      location: ".job-location"
      link: "a"
      date: ".job-date"
      snippet: ".job-description"
  - name: LinkedIn Jobs (HTML)
    type: html
    enabled: true
    url_template: "https://www.linkedin.com/jobs/search/?keywords={query}&location=Ireland"
    selectors:
      job_card: ".jobs-search__results-list li"
      title: ".base-search-card__title"
      company: ".base-search-card__subtitle"
      location: ".job-search-card__location"
      link: "a.base-card__full-link"
      date: "time"
      snippet: ".job-search-card__snippet"
  - name: Glassdoor (HTML)
    type: html
    enabled: true
    url_template: "https://www.glassdoor.ie/Job/jobs.htm?sc.keyword={query}"
    selectors:
      job_card: "li.react-job-listing"
      title: ".job-title"
      company: ".job-link"
      location: ".loc"
      link: "a.jobLink"
      date: ".d-flex align-items-center"
      snippet: ".job-snippet"
  - name: RecruitIreland (HTML)
    type: html
    enabled: true
    url_template: "https://www.recruitireland.com/jobs?keywords={query}"
    selectors:
      job_card: ".job-result"
      title: ".job-title"
      company: ".job-company"
      location: ".job-location"
      link: "a"
      date: ".job-date"
      snippet: ".job-description"
  - name: CPL (HTML)
    type: html
    enabled: true
    url_template: "https://www.cpl.com/jobs?keywords={query}"
    selectors:
      job_card: ".job-result"
      title: ".job-title"
      company: ".job-company"
      location: ".job-location"
      link: "a"
      date: ".job-date"
      snippet: ".job-description"
  - name: Morgan McKinley (HTML)
    type: html
    enabled: true
    url_template: "https://www.morganmckinley.com/ie/jobs?keywords={query}"
    selectors:
      job_card: ".job-result"
      title: ".job-title"
      company: ".job-company"
      location: ".job-location"
      link: "a"
      date: ".job-date"
      snippet: ".job-description"
  - name: Company Career Pages (ATS)
    type: ats
    enabled: true
    ats_boards:
      # Add company slugs to enable ATS sources; empty entries are skipped.
      - provider: greenhouse
        # Replace with Greenhouse board slug, e.g. "stripe"
        company: ""
      - provider: lever
        # Replace with Lever board slug, e.g. "figma"
        company: ""
      - provider: workable
        # Replace with Workable subdomain, e.g. "company"
        company: ""
